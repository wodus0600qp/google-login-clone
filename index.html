<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>로그인 - Google 계정</title>
  </head>

  <body>
    <div class="card">
      <div class="card-left">
        <img class="google-logo" src="Google__G__logo.svg.webp" alt="Google" />
        <h1>로그인</h1>
        <p class="desc">
          Google 계정으로 로그인합니다. 이 계정은 브라우저의 다른 Google 앱에서
          사용할 수 있습니다.
        </p>
      </div>
      <div class="card-right">
        <div class="input-wrapper">
          <input type="email" id="email" placeholder=" " />
          <label for="email">이메일 또는 휴대전화</label>
        </div>
        <a class="forgot-email" href="#">이메일을 잊으셨나요?</a>
        <p class="guest-mode">
          내 컴퓨터가 아닌가요? 게스트 모드를 사용하여 비공개로 로그인하세요.
          <a href="#">게스트 모드 사용 방법 자세히 알아보기</a>
        </p>
        <div class="buttons">
          <button class="create-account">계정 만들기</button>
          <button class="next">다음</button>
        </div>
      </div>
    </div>

    <footer>
      <div class="footer-left">
        <select>
          <option>한국어</option>
          <option>English</option>
        </select>
      </div>
      <div class="footer-right">
        <a href="#">도움말</a>
        <a href="#">개인정보처리방침</a>
        <a href="#">약관</a>
      </div>
    </footer>
  </body>
</html>
